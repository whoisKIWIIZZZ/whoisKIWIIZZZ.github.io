  - id: core
    name: 核心
    color: "#ffd54f"
  - id: AI
    name: 技术
    color: "#4fc3f7"
  - id: language
    name: 语言
    color: "#81c784"
  - id: note
    name: 笔记
    color: "#ff8a65"
  # - id: read
  #   name: 阅读
  #   color: "#ce93d8"

